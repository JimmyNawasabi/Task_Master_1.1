<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Master: Ultimate Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        :root {
            --bg: #09090b; --surface: #18181b; --border: #27272a;
            --primary: #8b5cf6; --accent: #f43f5e; --gold: #fbbf24;
            --text: #f4f4f5; --text-muted: #a1a1aa; --success: #22c55e;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 1100px; }
        .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.7); }
        h1, h2, h3 { color: var(--primary); font-weight: 800; text-transform: uppercase; margin: 0 0 15px 0; letter-spacing: 1px; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        label { display: block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 6px; font-weight: 700; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); box-sizing: border-box; font-family: inherit; margin-bottom: 10px; }
        .btn { padding: 14px; border: none; border-radius: 6px; cursor: pointer; font-weight: 800; width: 100%; text-transform: uppercase; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-gold { background: var(--gold); color: black; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-danger { background: var(--accent); color: white; }
        
        /* Inventory Specific Styling */
        .inventory-section { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; margin: 20px 0; }
        .inv-card { background: #111; padding: 15px; border-radius: 8px; border: 1px solid var(--border); }
        .chip { display: inline-flex; align-items: center; background: var(--border); padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; margin: 3px; border: 2px solid transparent; cursor: pointer; }
        .chip.active { border-color: var(--primary); background: #2e1a4d; }
        .chip span { margin-left: 8px; color: var(--accent); font-weight: bold; }

        .task-card { font-size: 1.1rem; line-height: 1.6; min-height: 200px; max-height: 500px; overflow-y: auto; padding: 25px; background: #0a0a0a; border-radius: 8px; border-left: 8px solid var(--primary); margin-bottom: 20px; }
        .item-highlight { color: var(--gold); font-weight: 800; text-decoration: underline; }
        #game-screen { display: none; }
        .timer-val { font-size: 4rem; font-weight: 800; color: var(--gold); text-align: center; }
        .score-display { display: flex; justify-content: space-around; background: #000; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--border); }
    </style>
</head>
<body>

<div class="app-container">
    <div id="setup-screen" class="panel">
        <h1>Engine Setup</h1>
        
        <div class="grid-3">
            <div>
                <label>Player A (Name)</label>
                <input type="text" id="pa-name" placeholder="Dominic">
                <label>Player B (Name)</label>
                <input type="text" id="pb-name" placeholder="Submissive">
            </div>
            <div>
                <label>Session Length (Rounds)</label>
                <input type="number" id="setup-rounds" value="10">
                <p style="font-size: 0.8rem; color: var(--text-muted);">Tasks will not repeat during these rounds.</p>
            </div>
        </div>

        <hr style="border: 0; border-top: 1px solid var(--border); margin: 25px 0;">

        <h3>1. Inventory Management</h3>
        <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 15px;">Type an item and press Enter to add it to your specific gear category.</p>
        <div id="inventory-ui" class="inventory-section">
            </div>

        <hr style="border: 0; border-top: 1px solid var(--border); margin: 25px 0;">

        <div class="grid-3">
            <div>
                <h3>2. Task Database</h3>
                <textarea id="new-task-text" placeholder="Use tags like {dom}, {sub}, [Restraint], [Impact]..." rows="4"></textarea>
                <input type="number" id="new-task-time" placeholder="Time in Seconds (e.g. 300)">
                <button class="btn btn-outline" onclick="Engine.saveCustomTask()">Save Task to Master DB</button>
            </div>
            <div>
                <h3>3. Grand Prizes</h3>
                <input type="text" id="new-prize" placeholder="Elaborate prize description...">
                <button class="btn btn-outline" onclick="Engine.savePrize()">Add Grand Prize</button>
                <div id="prize-list" style="margin-top: 10px; max-height: 150px; overflow-y: auto;"></div>
            </div>
        </div>

        <button class="btn btn-primary" style="width: 100%; margin-top: 30px; padding: 20px; font-size: 1.3rem;" onclick="Engine.start()">Enter the Chamber</button>
    </div>

    <div id="game-screen">
        <div class="panel">
            <div class="score-display">
                <div style="text-align:center"><label id="label-pa">P1</label><div id="score-pa" style="font-size: 1.5rem; font-weight: 800;">0</div></div>
                <div style="text-align:center"><label>Round</label><div id="ui-round" style="font-size: 1.5rem; font-weight: 800; color: var(--gold);">1</div></div>
                <div style="text-align:center"><label id="label-pb">P2</label><div id="score-pb" style="font-size: 1.5rem; font-weight: 800;">0</div></div>
            </div>

            <div style="text-align: center; margin-bottom: 15px;">
                <span style="text-transform: uppercase; font-weight: 800; color: var(--primary);">Current Dom: </span>
                <span id="current-dom-name" style="font-weight: 800; color: var(--text);">---</span>
            </div>

            <div class="timer-val" id="timer-display">00:00</div>
            
            <div class="task-card" id="task-text">Initializing task...</div>

            <div id="controls">
                <button class="btn btn-gold" id="timer-btn" onclick="Engine.triggerPhase()">Start Task Timer</button>
                
                <div id="res-btns" style="display: none; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <button class="btn btn-primary" onclick="Engine.resolve(true)">Success (Swap Roles)</button>
                    <button class="btn btn-danger" onclick="Engine.resolve(false)">Failure (Stay)</button>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
                    <button class="btn btn-outline" onclick="Engine.vetoTask()">Veto Task (Remove Forever)</button>
                    <button class="btn btn-outline" onclick="Engine.drawTask()" id="next-btn" style="display:none;">Next Round</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const Engine = {
    inventory: JSON.parse(localStorage.getItem('tm_vX_inv')) || { 
        Restraint: [], Impact: [], Sensory: [], Toy: [], Gag: [], Blindfold: [], Furniture: [], Clothing: [] 
    },
    customTasks: JSON.parse(localStorage.getItem('tm_vX_tasks')) || [
        { text: "{sub} is secured in [Restraint] to [Furniture]. {dom} uses [Impact] for [Time].", time: 300 },
        { text: "{sub} must apply [Gag] and [Blindfold], then wait for {dom}'s [Sensory] touch for [Time].", time: 450 }
    ],
    prizes: JSON.parse(localStorage.getItem('tm_vX_prizes')) || [
        "OVERNIGHT ANCHOR: {sub} is bound spread-eagle to [Furniture] for the night. Climax via [Toy] at dawn."
    ],
    
    sessionPool: [],
    state: { pa: {n:'', s:0}, pb: {n:'', s:0}, dom: null, sub: null, round: 1, total: 10, timeLeft: 0, timer: null, currentTask: null },

    init() {
        const ui = document.getElementById('inventory-ui');
        ui.innerHTML = '';
        Object.keys(this.inventory).forEach(cat => {
            const div = document.createElement('div');
            div.className = 'inv-card';
            div.innerHTML = `
                <label>${cat}</label>
                <input type="text" placeholder="Add ${cat}..." onkeydown="if(event.key==='Enter') Engine.addItem('${cat}', this)">
                <div id="list-${cat}" style="margin-top: 8px;"></div>
            `;
            ui.appendChild(div);
            this.renderItems(cat);
        });
        this.renderPrizes();
    },

    addItem(cat, el) {
        if(!el.value) return;
        this.inventory[cat].push({ n: el.value, a: true });
        el.value = ''; this.save(); this.renderItems(cat);
    },

    renderItems(cat) {
        const container = document.getElementById(`list-${cat}`);
        container.innerHTML = this.inventory[cat].map((item, i) => `
            <div class="chip ${item.a ? 'active' : ''}" onclick="Engine.toggleItem('${cat}', ${i})">
                ${item.n} <span onclick="event.stopPropagation(); Engine.removeItem('${cat}', ${i})">×</span>
            </div>
        `).join('');
    },

    toggleItem(cat, i) { this.inventory[cat][i].a = !this.inventory[cat][i].a; this.save(); this.renderItems(cat); },
    removeItem(cat, i) { this.inventory[cat].splice(i, 1); this.save(); this.renderItems(cat); },
    renderPrizes() { document.getElementById('prize-list').innerHTML = this.prizes.map((p, i) => `<div class="chip">${p.substring(0,25)}... <span onclick="Engine.removePrize(${i})">×</span></div>`).join(''); },
    removePrize(i) { this.prizes.splice(i, 1); this.save(); this.renderPrizes(); },
    save() {
        localStorage.setItem('tm_vX_inv', JSON.stringify(this.inventory));
        localStorage.setItem('tm_vX_tasks', JSON.stringify(this.customTasks));
        localStorage.setItem('tm_vX_prizes', JSON.stringify(this.prizes));
    },

    saveCustomTask() {
        const txt = document.getElementById('new-task-text').value;
        const time = parseInt(document.getElementById('new-task-time').value) || 300;
        if(txt) { this.customTasks.push({ text: txt, time: time }); this.save(); alert("Task Added!"); document.getElementById('new-task-text').value = ''; }
    },

    savePrize() {
        const p = document.getElementById('new-prize').value;
        if(p) { this.prizes.push(p); this.save(); this.renderPrizes(); document.getElementById('new-prize').value = ''; }
    },

    start() {
        this.state.pa.n = document.getElementById('pa-name').value || "Player A";
        this.state.pb.n = document.getElementById('pb-name').value || "Player B";
        this.state.total = parseInt(document.getElementById('setup-rounds').value) || 10;
        
        this.sessionPool = [...this.customTasks];
        if(Math.random() > 0.5) { this.state.dom = this.state.pa; this.state.sub = this.state.pb; }
        else { this.state.dom = this.state.pb; this.state.sub = this.state.pa; }
        
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        this.drawTask();
    },

    drawTask() {
        if(this.sessionPool.length === 0) { alert("No tasks left in pool!"); return; }
        const idx = Math.floor(Math.random() * this.sessionPool.length);
        this.state.currentTask = this.sessionPool.splice(idx, 1)[0];
        
        this.renderTask();
        document.getElementById('ui-round').innerText = `${this.state.round} / ${this.state.total}`;
        document.getElementById('timer-btn').style.display = 'block';
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('res-btns').style.display = 'none';
    },

    renderTask() {
        let raw = this.state.currentTask.text;
        let html = raw.replace(/{dom}/g, this.state.dom.n).replace(/{sub}/g, this.state.sub.n).replace(/\[Time\]/g, this.fmt(this.state.currentTask.time));
        
        Object.keys(this.inventory).forEach(cat => {
            const active = this.inventory[cat].filter(x => x.a);
            const val = active.length ? active[Math.floor(Math.random()*active.length)].n : `[Empty ${cat}]`;
            html = html.split(`[${cat}]`).join(`<span class="item-highlight">${val}</span>`);
        });

        document.getElementById('task-text').innerHTML = html;
        document.getElementById('current-dom-name').innerText = this.state.dom.n;
        document.getElementById('timer-display').innerText = this.fmt(this.state.currentTask.time);
        document.getElementById('score-pa').innerText = this.state.pa.s;
        document.getElementById('score-pb').innerText = this.state.pb.s;
    },

    triggerPhase() {
        this.state.timeLeft = this.state.currentTask.time;
        clearInterval(this.state.timer);
        this.state.timer = setInterval(() => {
            this.state.timeLeft--;
            document.getElementById('timer-display').innerText = this.fmt(this.state.timeLeft);
            if(this.state.timeLeft <= 0) clearInterval(this.state.timer);
        }, 1000);
        document.getElementById('timer-btn').style.display = 'none';
        document.getElementById('res-btns').style.display = 'grid';
    },

    resolve(success) {
        if(success) {
            this.state.sub.s++;
            let t = this.state.dom; this.state.dom = this.state.sub; this.state.sub = t;
        } else { this.state.sub.s--; }
        
        if(this.state.round >= this.state.total) this.end();
        else { this.state.round++; document.getElementById('res-btns').style.display = 'none'; document.getElementById('next-btn').style.display = 'block'; }
    },

    vetoTask() {
        const idx = this.customTasks.findIndex(t => t.text === this.state.currentTask.text);
        if(idx !== -1) this.customTasks.splice(idx, 1);
        this.save(); this.drawTask();
    },

    end() {
        const winner = this.state.pa.s > this.state.pb.s ? this.state.pa : this.state.pb;
        const p = this.prizes[Math.floor(Math.random()*this.prizes.length)];
        document.getElementById('game-screen').innerHTML = `
            <div class="panel" style="text-align:center">
                <h1>Game Over</h1>
                <h2>Winner: ${winner.n}</h2>
                <div class="task-card">${p.replace(/{dom}/g, winner.n).replace(/{sub}/g, (winner === this.state.pa ? this.state.pb.n : this.state.pa.n))}</div>
                <button class="btn btn-primary" onclick="location.reload()">Reset Engine</button>
            </div>
        `;
    },

    fmt: (s) => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`
};
Engine.init();
</script>
</body>
</html>
